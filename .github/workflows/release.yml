name: Release

# Build + publish a GitHub Release whenever a version tag is pushed.
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

# Needed for softprops/action-gh-release to create the release & upload assets.
permissions:
  contents: write

jobs:
  build-release:
    # Build on 22.04 (older glibc/webkit) so the .deb/AppImage run on more distros.
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # System dependencies for building a Tauri v2 app on Ubuntu (see README).
      # fakeroot: matches the local `build:app` script; libxkbcommon-dev: Wayland portal paste.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            libxkbcommon-dev pkg-config patchelf fakeroot

      - name: Install frontend dependencies
        run: npm install

      # Runs the project's own build (fakeroot tauri build -> tsc + vite + cargo).
      # Produces .deb and .AppImage under src-tauri/target/release/bundle/.
      - name: Build app
        run: npm run build:app

      # Rename artifacts to a predictable, space-free name so the curl URLs in the
      # release notes are stable regardless of Tauri's productName formatting.
      - name: Collect artifacts
        id: pkg
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist-artifacts

          DEB=$(find src-tauri/target/release/bundle/deb -name '*.deb' | head -n1)
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -n1)

          cp "$DEB"      "dist-artifacts/linux-clipboard_${VERSION}_amd64.deb"
          cp "$APPIMAGE" "dist-artifacts/linux-clipboard_${VERSION}_amd64.AppImage"

          # Standalone data-wipe helper — for AppImage users (no package manager)
          # and for a complete wipe that also clears the GNOME shortcut/autostart.
          install -m 755 scripts/uninstall.sh "dist-artifacts/linux-clipboard-uninstall.sh"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          ls -lh dist-artifacts

      # Build the release description: curl download + dpkg install commands.
      # Quoted heredoc keeps backticks literal; @@…@@ placeholders filled by sed.
      - name: Generate release notes
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## Linux Clipboard @@VERSION@@

          A Windows 10-style clipboard history manager for Linux (Ubuntu/GNOME).
          Build for **x86_64 / amd64**.

          ### 📦 Install via `.deb` (Ubuntu/Debian)

          ```bash
          curl -L -o linux-clipboard.deb \
            https://github.com/@@REPO@@/releases/download/@@TAG@@/linux-clipboard_@@VERSION@@_amd64.deb
          sudo dpkg -i linux-clipboard.deb
          sudo apt-get install -f   # pull in any missing dependencies (libxdo3, ...)
          ```

          ### 📥 AppImage (run directly, no install)

          ```bash
          curl -L -o linux-clipboard.AppImage \
            https://github.com/@@REPO@@/releases/download/@@TAG@@/linux-clipboard_@@VERSION@@_amd64.AppImage
          chmod +x linux-clipboard.AppImage
          ./linux-clipboard.AppImage
          ```

          ### 🗑️ Uninstall (fully remove data)

          **`.deb`** — `purge` removes the app together with all its data (history, images, settings) for every user:

          ```bash
          sudo apt purge linux-clipboard      # or: sudo dpkg -P linux-clipboard
          ```

          **AppImage**, or to wipe *every last trace* (including the GNOME shortcut and the
          run-on-login entry — things the root-run `apt purge` cannot touch):

          ```bash
          curl -L -o linux-clipboard-uninstall.sh \
            https://github.com/@@REPO@@/releases/download/@@TAG@@/linux-clipboard-uninstall.sh
          bash linux-clipboard-uninstall.sh          # add --remove-package to also remove the .deb
          ```

          > The `.deb` also installs a `linux-clipboard-uninstall` command (run it as your normal user).
          EOF
          sed -i "s|@@VERSION@@|${VERSION}|g; s|@@TAG@@|${TAG}|g; s|@@REPO@@|${REPO}|g" RELEASE_NOTES.md
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Linux Clipboard ${{ steps.pkg.outputs.version }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist-artifacts/linux-clipboard_${{ steps.pkg.outputs.version }}_amd64.deb
            dist-artifacts/linux-clipboard_${{ steps.pkg.outputs.version }}_amd64.AppImage
            dist-artifacts/linux-clipboard-uninstall.sh
